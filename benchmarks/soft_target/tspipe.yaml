tspipe:
  train:  
    deferred_batch_norm: false
    save_model_every_iter: 100
    
  model_split: 

    # 배치 512
    #target: [9, 6, 6, 9]
    #online: [9, 11, 16, 21]

    # 배치 256
    #target: [9, 6, 6, 9]
    #online: [9, 11, 16, 21]
    
    # 배치 128
    #target: [9, 6, 6, 9]
    #online: [10, 11, 16, 20]

    # 배치 64
    target: [9, 7, 7, 7]
    online: [10, 14, 18, 15]

    # 배치 32
    #target: [9, 6, 6, 9]
    #online: [12, 13, 15, 17]

    # 배치 16
    #target: [9, 6, 6, 9]
    #online: [15, 13, 14, 15]

    # 배치 8
    #target: [9, 6, 6, 9]
    #online: [16, 13, 13, 15]
    
  
  optimizer:
    skip_optimizer: False
    num_skip_initial_staleness: 0
    gradient_accumulation: 1
    reduce_verbose: False

  gpipe_emulation:
    enabled: True
    num_ubatch: 1

  async_param_update_emulation:
    enabled: False